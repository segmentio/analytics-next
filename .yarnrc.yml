nodeLinker: node-modules

# Resolve packages (incl. private @segment/*) through Twilio's Artifactory npm virtual
# repo. Locked-down Buildkite agents cannot reach registry.npmjs.org directly;
# virtual-npm-twilio proxies public npm AND serves local-npm-segment, so no npmjs auth
# token is needed for installs. Host MUST be npmjs.artifacts.twilio.com, not
# artifactory.twilioinfra.com (that host resolves to a blocked public IP from inside
# locked-down build containers).
npmRegistryServer: 'https://npmjs.artifacts.twilio.com/artifactory/api/npm/virtual-npm-twilio/'
npmScopes:
  segment:
    npmRegistryServer: 'https://npmjs.artifacts.twilio.com/artifactory/api/npm/virtual-npm-twilio/'

plugins:
  - path: .yarn/plugins/@yarnpkg/plugin-workspace-tools.cjs
    spec: "@yarnpkg/plugin-workspace-tools"
  - path: .yarn/plugins/@yarnpkg/plugin-constraints.cjs
    spec: "@yarnpkg/plugin-constraints"
  - path: .yarn/plugins/@yarnpkg/plugin-interactive-tools.cjs
    spec: "@yarnpkg/plugin-interactive-tools"
  - path: .yarn/plugins/@yarnpkg/plugin-typescript.cjs
    spec: "@yarnpkg/plugin-typescript"

preferInteractive: true

yarnPath: .yarn/releases/yarn-3.4.1.cjs
