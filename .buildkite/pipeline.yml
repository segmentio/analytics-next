agents:
  queue: general-039

env:
  COVERAGE: true
  ECR_REGISTRY: '018537234677.dkr.ecr.us-east-1.amazonaws.com'
  NODE_IMAGE: '018537234677.dkr.ecr.us-east-1.amazonaws.com/docker.io/library/node:20.19.4-bookworm'
  SEGMENT_ECR_REGISTRY: '528451384384.dkr.ecr.us-west-2.amazonaws.com'
  # Built by the ":docker: Build CI Agent Image" step below from .buildkite/Dockerfile.agent --
  # Alpine base-node + apk-installed chromium (matching segmentio/analytics.js-integrations'
  # Dockerfile.ci pattern), NOT a Playwright-downloaded binary. Steps that run real browser
  # tests use this instead of the plain NODE_IMAGE.
  PLAYWRIGHT_IMAGE: '528451384384.dkr.ecr.us-west-2.amazonaws.com/analytics-next-ci-agent:latest'
  # Consumed by qa/lib/browser.ts and the two playwright.config.ts files (via
  # launchOptions.executablePath) to point Playwright at the system Chromium above
  # instead of trying to download its own. CHROME_PATH is the convention find-chrome-bin
  # (estimo/size-limit's browser locator) checks, for the same reason.
  PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: '/usr/bin/chromium-browser'
  CHROME_PATH: '/usr/bin/chromium-browser'

steps:
  - block: Allow this build to run?
    prompt: ':rotating_light: Review the PR for concerning changes before unblocking'
    if: build.pull_request.repository.fork
    blocked_state: running

  # Build #16 confirmed `playwright install --with-deps` can't fetch the Chromium binary
  # from locked-down general-039 agents (registry.npmjs.org direct + every
  # playwright.azureedge.net CDN mirror all ECONNRESET/timeout). Switched to apk-installing
  # chromium from an Alpine base image instead -- matches the working pattern in
  # segmentio/analytics.js-integrations' .buildkite/Dockerfile.ci. soft_fail retained until
  # this is validated by an actual green build; remove once confirmed. The four steps below
  # that depend on this image are soft_fail'd/allow_dependency_failure'd for the same reason.
  - label: ':docker: Build CI Agent Image (Playwright)'
    key: build-agent-image
    soft_fail: true
    commands:
      - echo "--- Cross-account ECR login (Segment ECR, buildkite-agent role)"
      - make -C .buildkite agent-login-ci
      - echo "--- Build + push agent image"
      - make -C .buildkite agent

  - label: Log Environment
    commands:
      - unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER
      - echo "+++ Node Version"
      - echo $(node -v)
      - echo "+++ MiscVariables"
      - echo "CI -> $CI"
    plugins:
      - docker#v5.13.0:
          image: '${NODE_IMAGE}'
          propagate-environment: true

  - label: '[Monorepo] QA'
    key: monorepo
    commands:
      - unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER
      - echo "--- Install dependencies"
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 yarn install --immutable
      - echo "+++ Run tests"
      - yarn constraints
      - yarn scripts test
      - yarn scripts lint
      - yarn run test:check-dts
    plugins:
      - docker#v5.13.0:
          image: '${NODE_IMAGE}'
          propagate-environment: true

  # Confirmed build #17: `make ci`'s test-integration target runs jsdom, not a real
  # browser, but a *different* step in scripts/ci.sh ("--- Check Size" / size-limit's
  # `estimo` dependency, via find-chrome-bin) needs a real Chromium to benchmark bundle
  # run time. Now runs on PLAYWRIGHT_IMAGE (apk chromium) instead of plain NODE_IMAGE;
  # CHROME_PATH (set at top) points find-chrome-bin at it instead of downloading one.
  # soft_fail retained until validated by a green build.
  # The docker#v5.13.0 plugin pulls its image BEFORE this step's commands run, on
  # whichever fresh agent the job lands on -- the login done in build-agent-image
  # doesn't carry over. So for PLAYWRIGHT_IMAGE steps, login + `docker run` are both
  # done here manually instead of via the plugin (matches control-plane's host-level
  # docker run pattern for the same cross-account-pull problem).
  - label: '[Browser] Lint + Test'
    key: browser-lint-test
    soft_fail: true
    depends_on: 'build-agent-image'
    allow_dependency_failure: true
    env:
      SEGMENT_CODECOV_FLAGS: 'browser'
      SEGMENT_CODECOV_ARGS: '--dir=./packages/browser/coverage'
    commands:
      - echo "--- Cross-account ECR login (Segment ECR, buildkite-agent role)"
      - make -C .buildkite agent-login-ci
      - echo "--- Install dependencies + run tests"
      - |
        docker run --rm --init \
          --volume "$$PWD:/workdir" --workdir /workdir \
          -e COVERAGE -e SEGMENT_CODECOV_FLAGS -e SEGMENT_CODECOV_ARGS -e CHROME_PATH \
          -e PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH \
          "${PLAYWRIGHT_IMAGE}" \
          sh -c 'unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 yarn install --immutable && yarn run -T browser exec make ci'

  # See the manual-login note on [Browser] Lint + Test above.
  - label: '[Browser] QA / E2E :perfection:'
    key: qa
    env:
      COVERAGE: false
    depends_on: 'build-agent-image'
    allow_dependency_failure: true
    soft_fail: true
    commands:
      - echo "--- Cross-account ECR login (Segment ECR, buildkite-agent role)"
      - make -C .buildkite agent-login-ci
      - echo "--- Install dependencies + run tests"
      - |
        docker run --rm --init \
          --volume "$$PWD:/workdir" --workdir /workdir \
          -e COVERAGE -e CHROME_PATH -e PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH \
          "${PLAYWRIGHT_IMAGE}" \
          sh -c 'unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 yarn install --immutable && yarn run -T browser exec make test-qa'
    retry:
      automatic:
        - exit_status: '*'
          limit: 2

  # See the manual-login note on [Browser] Lint + Test above.
  - label: '[Browser] Integration Tests :perfection:'
    key: browser-integ
    env:
      COVERAGE: false
    depends_on: 'build-agent-image'
    allow_dependency_failure: true
    soft_fail: true
    commands:
      - echo "--- Cross-account ECR login (Segment ECR, buildkite-agent role)"
      - make -C .buildkite agent-login-ci
      - echo "--- Install dependencies + run tests"
      - |
        docker run --rm --init \
          --volume "$$PWD:/workdir" --workdir /workdir \
          -e COVERAGE -e CHROME_PATH -e PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH \
          "${PLAYWRIGHT_IMAGE}" \
          sh -c 'unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 yarn install --immutable && yarn turbo run --filter=@internal/browser-integration-tests test:int'
    retry:
      automatic:
        - exit_status: '*'
          limit: 2

  - label: '[Core] Lint + Test'
    env:
      SEGMENT_CODECOV_FLAGS: 'core'
      SEGMENT_CODECOV_ARGS: '--dir=./packages/core/coverage'
    commands:
      - unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER
      - echo "--- Install dependencies"
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 yarn install --immutable
      - echo "--- Build bundles"
      - yarn run -T core . build
      - echo "+++ Run tests"
      - yarn run -T core lint
      - yarn run -T core test
      - yarn turbo run --filter=@internal/core-integration-tests lint
    plugins:
      - docker#v5.13.0:
          image: '${NODE_IMAGE}'
          propagate-environment: true

  - label: '[Misc Utils] Lint + Test'
    commands:
      - unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER
      - echo "--- Install dependencies"
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 yarn install --immutable
      - echo "+++ Run QA for generic-utils"
      - yarn turbo run --filter=@segment/analytics-generic-utils lint
      - yarn turbo run --filter=@segment/analytics-generic-utils test
      - echo "+++ Run QA for page-tools"
      - yarn turbo run --filter=@segment/analytics-page-tools lint
      - yarn turbo run --filter=@segment/analytics-page-tools test
    plugins:
      - docker#v5.13.0:
          image: '${NODE_IMAGE}'
          propagate-environment: true

  - label: '[Consent] Lint + Test'
    commands:
      - unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER
      - echo "--- Install dependencies"
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 yarn install --immutable
      - echo "--- Build bundles"
      - yarn turbo run --filter='./packages/consent/*' build
      - echo "+++ Run Lint"
      - yarn turbo run --filter='./packages/consent/*' lint
      - echo "+++ Run Tests"
      - yarn turbo run --filter='./packages/consent/*' test
    plugins:
      - docker#v5.13.0:
          image: '${NODE_IMAGE}'
          propagate-environment: true

  # See the manual-login note on [Browser] Lint + Test above.
  - label: '[Consent] Integration Tests'
    depends_on: 'build-agent-image'
    allow_dependency_failure: true
    soft_fail: true
    commands:
      - echo "--- Cross-account ECR login (Segment ECR, buildkite-agent role)"
      - make -C .buildkite agent-login-ci
      - echo "--- Install dependencies + run tests"
      - |
        docker run --rm --init \
          --volume "$$PWD:/workdir" --workdir /workdir \
          -e CHROME_PATH -e PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH \
          "${PLAYWRIGHT_IMAGE}" \
          sh -c 'echo "DEBUG PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$$PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH" && ls -la /usr/bin/chromium* 2>&1; unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 yarn install --immutable && yarn turbo run --filter="./packages/consent/consent-tools-integration-tests" test:int'

  # See the manual-login note on [Browser] Lint + Test above.
  - label: ':thisisfine: [Browser] Destinations QA / E2E'
    key: destinations
    env:
      COVERAGE: false
    depends_on: 'build-agent-image'
    allow_dependency_failure: true
    soft_fail:
      - exit_status: '*'
    commands:
      - echo "--- Cross-account ECR login (Segment ECR, buildkite-agent role)"
      - make -C .buildkite agent-login-ci
      - echo "--- Install dependencies + run tests"
      - |
        docker run --rm --init \
          --volume "$$PWD:/workdir" --workdir /workdir \
          -e COVERAGE -e CHROME_PATH -e PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH \
          "${PLAYWRIGHT_IMAGE}" \
          sh -c 'unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 yarn install --immutable && yarn run -T browser exec make test-qa-destinations'

  # NOTE: branches tightened to `master` only (was `!v* !@segment/* !publish-test`,
  # i.e. "run on everything except release branches") while credential wiring below
  # is unvalidated -- a broad deny-list would fire a real CDN publish from this
  # repair/test branch. Relax back to the original gate once the secret below is
  # confirmed to exist and the step has gone green on master.
  - label: '[Browser] Release to CDN :rocket:'
    branches: 'master'
    commands:
      - unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER
      # TODO(vic): confirm this is the actual provisioned cluster secret name --
      # guessed placeholder, will fail loudly with "secret not found" if wrong.
      - echo "--- Fetch CDN publish credentials"
      - eval "$(buildkite-agent secret get "analytics-next-cdn-deploy" --format env)"
      - echo "--- Install dependencies"
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 yarn install --immutable
      - echo "+++ Release to CDN"
      - yarn run -T browser release:cdn
    plugins:
      - docker#v5.13.0:
          image: '${NODE_IMAGE}'
          propagate-environment: true

  - label: '[Playgrounds] Lint + Test :hammer:'
    key: playgrounds
    commands:
      - unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER
      - echo "--- Install dependencies"
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 yarn install --immutable
      - echo "--- Build bundles"
      - yarn turbo run --filter='./playgrounds/*' build
      - echo "+++ Run tests"
      - yarn turbo run --filter='./playgrounds/*' lint
    plugins:
      - docker#v5.13.0:
          image: '${NODE_IMAGE}'
          propagate-environment: true

  # Deploy and NPM publish releases
  - label: '[Browser] Publish Packages to NPM :rocket:'
    if: |
      // Only run when Version Packages PR is merged in
      build.message =~ /^Version Packages/ &&
      build.branch == "master" &&
      build.message !~ /\[skip\]/i
    commands:
      - unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER
      # TODO(vic): confirm the provisioned secret names -- real npmjs.org publish
      # token (not the Artifactory install-only mirror) and a scoped GitHub token
      # for release creation (was SEGMENT_GITHUB_APP: release-writer on Segment BK).
      - echo "--- Fetch npmjs.org publish + GitHub release credentials"
      - npm config set "//registry.npmjs.org/:_authToken" "$(buildkite-agent secret get "analytics-next-npm-publish-token")"
      - export GH_TOKEN=$(buildkite-agent secret get "analytics-next-github-release-token")
      - git config --global user.name "buildkite-agent"
      - git config --global user.email "buildkite-agent@segment.com"
      - gh repo set-default segmentio/analytics-next
      - echo "--- Install dependencies"
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 yarn install --immutable
      - echo "+++ Release packages"
      - yarn release
      - yarn scripts create-release-from-tags
    plugins:
      - docker#v5.13.0:
          image: '${NODE_IMAGE}'
          propagate-environment: true

  - label: 'Snyk :lock:'
    # bk-snyk was a Segment-Buildkite-only CLI wrapper (injected via the old
    # SEGMENT_CONTEXTS: snyk context); no Twilio equivalent exists yet -- neither
    # control-plane nor debugger-service run Snyk in CI. soft_fail so this doesn't
    # block the build until a real replacement is identified.
    soft_fail: true
    commands:
      - unset YARN_REGISTRY YARN_NPM_REGISTRY_SERVER
      - bk-snyk
    plugins:
      - docker#v5.13.0:
          image: '${NODE_IMAGE}'
          propagate-environment: true
