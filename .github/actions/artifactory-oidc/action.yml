name: 'Artifactory OIDC Auth'
description: 'Exchange GitHub OIDC token for an Artifactory access token and configure Yarn Berry to resolve through it'

runs:
  using: 'composite'
  steps:
    - name: Exchange OIDC token for Artifactory access token
      shell: bash
      run: |
        set -euo pipefail

        # jq is used throughout; fail early with a clear message if it's absent
        # (present on ubuntu-latest-large today, but not guaranteed on every runner).
        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::jq is required by the artifactory-oidc action but was not found on the runner."
          exit 1
        fi

        # Normalize the base URL: strip any trailing slashes so REGISTRY and the
        # //host/... auth line never end up with double slashes.
        BASE_URL=$(echo "${ARTIFACTORY_URL}" | sed -E 's#/+$##')
        if [ -z "$BASE_URL" ]; then
          echo "::error::ARTIFACTORY_URL is empty."
          exit 1
        fi

        # 1. Request a GitHub OIDC JWT with Artifactory as the audience.
        GITHUB_JWT=$(curl -sS \
          -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${BASE_URL}" \
          | jq -r '.value')

        # 2. Exchange it for an Artifactory access token. The body MUST be JSON
        #    and MUST include provider_name, or JFrog issues no token.
        RESP=$(curl -sS "${BASE_URL}/access/api/v1/oidc/token" \
          -H 'Content-Type: application/json' \
          -d "{\"grant_type\":\"urn:ietf:params:oauth:grant-type:token-exchange\",
               \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\",
               \"subject_token\":\"${GITHUB_JWT}\",
               \"provider_name\":\"github-actions-segmentio\"}")
        ART_TOKEN=$(echo "$RESP" | jq -r '.access_token // empty')

        if [ -z "$ART_TOKEN" ]; then
          echo "::error::OIDC token exchange failed. Redacted response below:"
          # Redact every key whose name contains "token" (access_token,
          # refresh_token, id_token, ...). Withhold entirely if not valid JSON —
          # never print a raw, unredacted body.
          echo "$RESP" | jq 'walk(if type == "object" then with_entries(if (.key | test("token"; "i")) then .value = "<redacted>" else . end) else . end)' 2>/dev/null \
            || echo "::error::(response withheld — not valid JSON)"
          exit 1
        fi
        echo "::add-mask::$ART_TOKEN"

        # 3. Point Yarn Berry at the curated Artifactory registry for this job.
        # Yarn Berry doesn't read npm's ~/.npmrc for its own resolution — it
        # reads .yarnrc.yml. The top-level npmRegistryServer/npmAuthToken/
        # npmAlwaysAuth env vars (YARN_NPM_*) are enough for the Resolution
        # step (package metadata), but Yarn Berry's tarball fetcher looks up
        # credentials from a per-registry npmRegistries entry, keyed by
        # registry URL, not from those top-level defaults - relying on the
        # env vars alone left every real tarball fetch unauthenticated
        # (confirmed: direct requests with this exact token succeed, and
        # yarn's own resolved npmAuthToken/npmAlwaysAuth were confirmed
        # correct right before install, yet every fetch still 401'd as
        # anonymous). Writing an explicit npmRegistries block covers both
        # paths. This edits the working tree only, never committed.
        REGISTRY="${BASE_URL}/artifactory/api/npm/virtual-npm-thirdparty/"
        {
          echo "YARN_NPM_REGISTRY_SERVER=${REGISTRY}"
          echo "YARN_NPM_AUTH_TOKEN=${ART_TOKEN}"
          echo "YARN_NPM_ALWAYS_AUTH=true"
        } >> "$GITHUB_ENV"

        cat >> .yarnrc.yml <<YAML
        npmRegistries:
          "${REGISTRY}":
            npmAuthToken: "${ART_TOKEN}"
            npmAlwaysAuth: true
        YAML

        echo "::notice::Yarn configured to use Artifactory registry"
